<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoastApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Palette ───────────────────────────────────────────────────────
       espresso-dark  #080200   (sidebar)
       deep-roast     #0f0500   (page background)
       card-dark      #1e0e04   (card surfaces)
       fire-orange    #c05808   (buttons, active nav, badges)
       amber-gold     #e8a020   (sidebar nav links)
       bright-gold    #f5b010   (brand, page titles)
       warm-cream     #e8d0a8   (body text)
    ────────────────────────────────────────────────────────────────── */

    /* Bootstrap dark theme overrides */
    [data-bs-theme="dark"] {
      --bs-body-bg:           #0f0500;
      --bs-body-color:        #e8d0a8;
      --bs-card-bg:           #1e0e04;
      --bs-card-border-color: transparent;
      --bs-input-bg:          #2a1400;
      --bs-border-color:      #3a1a08;
      --bs-secondary-color:   #9a7050;
      --bs-table-bg:          #1e0e04;
      --bs-table-striped-bg:  #260f04;
      --bs-table-hover-bg:    #2e1406;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    /* ── Sidebar (desktop) ── */
    .sidebar {
      background-color: #080200;
    }
    @media (min-width: 992px) {
      .sidebar {
        width: 220px;
        min-height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }
      .sidebar .offcanvas-body {
        padding: 1.75rem 1rem;
        display: flex;
        flex-direction: column;
      }
      .main-content {
        margin-left: 220px;
      }
    }
    @media (max-width: 991.98px) {
      .main-content {
        margin-left: 0;
        padding: 1.25rem 1rem;
      }
    }

    .sidebar .brand {
      color: #f5b010;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sidebar .nav-link {
      color: #e8a020;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.2rem;
      font-size: 0.95rem;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background-color: #c05808;
      color: #fff;
    }

    /* ── Mobile top bar ── */
    .mobile-topbar {
      background-color: #080200;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 1030;
    }
    .mobile-topbar .brand {
      color: #f5b010;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
    }
    .mobile-topbar .hamburger {
      background: none;
      border: none;
      color: #f5b010;
      font-size: 1.5rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    /* ── Main content ── */
    .main-content {
      padding: 2.5rem 2rem;
      min-height: 100vh;
    }
    .card {
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .btn-coffee {
      background-color: #c05808;
      color: #fff;
      border: none;
    }
    .btn-coffee:hover {
      background-color: #e8a020;
      color: #0f0500;
    }
    h4.page-title {
      color: #f5b010;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9a7050;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    /* Inputs and selects */
    .form-control, .form-select {
      background-color: #2a1400;
      border-color: #3a1a08;
      color: #e8d0a8;
    }
    .form-control:focus, .form-select:focus {
      background-color: #2a1400;
      border-color: #c05808;
      color: #e8d0a8;
      box-shadow: 0 0 0 0.2rem rgba(192,88,8,0.25);
    }
    .form-control::placeholder {
      color: #6a4828;
    }

    /* Table tweaks */
    .table-light th {
      background-color: #2a1400 !important;
      color: #e8a020;
      border-color: #3a1a08;
    }
    .table {
      --bs-table-border-color: #3a1a08;
    }
  </style>
</head>
<body>

  <!-- Mobile top bar (hidden on desktop) -->
  <header class="mobile-topbar d-lg-none">
    <button class="hamburger" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
      &#9776;
    </button>
    <a class="brand" href="/">RoastApp</a>
  </header>

  <!-- Sidebar — offcanvas on mobile, fixed on desktop -->
  <nav class="offcanvas-lg offcanvas-start sidebar" id="sidebar" tabindex="-1">
    <div class="offcanvas-header d-lg-none" style="background-color:#080200;padding:1rem">
      <span class="brand mb-0">RoastApp</span>
      <button type="button" class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
    </div>
    <div class="offcanvas-body">
      <a class="brand d-none d-lg-block" href="/">RoastApp</a>
      <div class="nav flex-column">
        <a class="nav-link {% if request.endpoint == 'beans_page' %}active{% endif %}"
           href="/beans">Beans</a>
        <a class="nav-link {% if request.endpoint == 'roast_page' %}active{% endif %}"
           href="/roast">Roast</a>
        <a class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}"
           href="/history">Roast History</a>
      </div>
    </div>
  </nav>

  <div class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
