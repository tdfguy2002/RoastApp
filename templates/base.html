<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoastApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Palette from the roasting image ──────────────────────────────
       espresso-dark  #1a0800   (deep background)
       ember-brown    #7a3008   (bean body)
       fire-orange    #c05808   (glow / CTA)
       amber-gold     #e8a020   (flame mid)
       bright-gold    #f5b010   (flame tips / highlights)
       parchment      #f7eddf   (page background)
    ───────────────────────────────────────────────────────────────── */
    html, body {
      height: 100%;
      margin: 0;
      background-color: #f7eddf;
    }

    /* ── Sidebar (desktop) ── */
    .sidebar {
      background-color: #1a0800;
    }
    @media (min-width: 992px) {
      .sidebar {
        width: 220px;
        min-height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }
      .sidebar .offcanvas-body {
        padding: 1.75rem 1rem;
        display: flex;
        flex-direction: column;
      }
      .main-content {
        margin-left: 220px;
      }
    }
    @media (max-width: 991.98px) {
      .main-content {
        margin-left: 0;
        padding: 1.25rem 1rem;
      }
    }

    .sidebar .brand {
      color: #f5b010;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sidebar .nav-link {
      color: #e8a020;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.2rem;
      font-size: 0.95rem;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background-color: #c05808;
      color: #fff;
    }

    /* ── Mobile top bar ── */
    .mobile-topbar {
      background-color: #1a0800;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 1030;
    }
    .mobile-topbar .brand {
      color: #f5b010;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
    }
    .mobile-topbar .hamburger {
      background: none;
      border: none;
      color: #f5b010;
      font-size: 1.5rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    /* ── Main content ── */
    .main-content {
      padding: 2.5rem 2rem;
      min-height: 100vh;
    }
    .card {
      border: none;
      box-shadow: 0 1px 8px rgba(26,8,0,0.14);
    }
    .btn-coffee {
      background-color: #c05808;
      color: #fff;
      border: none;
    }
    .btn-coffee:hover {
      background-color: #1a0800;
      color: #fff;
    }
    h4.page-title {
      color: #3d1800;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a5030;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

  <!-- Mobile top bar (hidden on desktop) -->
  <header class="mobile-topbar d-lg-none">
    <button class="hamburger" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
      &#9776;
    </button>
    <a class="brand" href="/">RoastApp</a>
  </header>

  <!-- Sidebar — offcanvas on mobile, fixed on desktop -->
  <nav class="offcanvas-lg offcanvas-start sidebar" id="sidebar" tabindex="-1">
    <div class="offcanvas-header d-lg-none" style="background-color:#1a0800;padding:1rem">
      <span class="brand mb-0">RoastApp</span>
      <button type="button" class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
    </div>
    <div class="offcanvas-body">
      <a class="brand d-none d-lg-block" href="/">RoastApp</a>
      <div class="nav flex-column">
        <a class="nav-link {% if request.endpoint == 'beans_page' %}active{% endif %}"
           href="/beans">Beans</a>
        <a class="nav-link {% if request.endpoint == 'roast_page' %}active{% endif %}"
           href="/roast">Roast</a>
        <a class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}"
           href="/history">Roast History</a>
      </div>
    </div>
  </nav>

  <div class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
